<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EDI 210 发票列表</title>
    <link rel="stylesheet" type="text/css" media="screen" href="../../css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" media="screen" href="../../css/dataTables.bootstrap.min.css">
    <link rel="stylesheet" type="text/css" media="screen" href="../../css/select.dataTables.min.css">
    <link rel="stylesheet" type="text/css" media="screen" href="../../layui/css/layui.css">
</head>
<body>
<div>
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <header style="height: 100%">
            <div align="left">
                <table style="width: 100%">
                    <tr>
                        <td>
                            <form class="form-inline" onsubmit="return false">
                                <div class="form-group">
                                    Region：
                                    <select id="region" class="form-control">
                                        <option value="">全部</option>
                                        <option value="AMR">AMR</option>
                                        <option value="APAC">APAC</option>
                                        <option value="EMEIA">EMEIA</option>
                                    </select>
                                    SCAC：<input id="scac" type="text" class="form-control" placeholder="SCAC">
                                    INV#：<input id="invNo" type="text" class="form-control" placeholder="INV#">
                                    BOL：<input id="bol" type="text" class="form-control" placeholder="BOL">
                                    日期 从：<input id="dateFrom" type="text" class="form-control" placeholder="YYYY-MM-DD">
                                    至：<input id="dateTo" type="text" class="form-control" placeholder="YYYY-MM-DD">
                                    <button id="searchBt" class="layui-btn layui-btn-sm">
                                        <i class="layui-icon">&#xe615;</i>搜索
                                    </button>
                                    <hr class="layui-border-green">
                                    <button id="exportExcel" class="layui-btn">
                                        <i class="layui-icon">&#xe601;</i>导出
                                    </button>
                                    <button id="importExcel" class="layui-btn">
                                        <i class="layui-icon">&#xe67c;</i>导入
                                    </button>
                                    <button id="downloadTpl" class="layui-btn layui-btn-primary">
                                        <i class="layui-icon">&#xe601;</i>下载模板
                                    </button>
                                </div>
                            </form>
                        </td>
                    </tr>
                </table>
            </div>
        </header>

        <div>
            <div class="widget-body no-padding">
                <table id="dt-table" class="table table-striped table-bordered table-hover" style="width:100%">
                    <thead>
                    <tr>
                        <th>id</th>
                        <th>Region</th>
                        <th>SCAC</th>
                        <th>INV#</th>
                        <th>INV Date</th>
                        <th>BOL</th>
                        <th>Bill-To</th>
                        <th>Shipper</th>
                        <th>Consignee</th>
                        <th>CUR</th>
                        <th>Amount</th>
                        <th>明细数</th>
                        <th>Status</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<form class="form-horizontal" id="exportForm" method="post" action="/edi210/export"
      onsubmit="return false" enctype="multipart/form-data">
    <input id="regionForm"   name="region"   hidden="true">
    <input id="scacForm"     name="scac"     hidden="true">
    <input id="invNoForm"    name="invNo"    hidden="true">
    <input id="bolForm"      name="bol"      hidden="true">
    <input id="dateFromForm" name="dateFrom" hidden="true">
    <input id="dateToForm"   name="dateTo"   hidden="true">
    <input id="token"        name="token"    hidden="true">
</form>

</body>
</html>

<script type="text/javascript" src="../../js/libs/jquery-2.1.1.min.js"></script>
<script type="text/javascript" src="../../js/jq.js"></script>
<script type="text/javascript" src="../../layui/layui.js"></script>
<script type="text/javascript" src="../../js/plugin/datatables/jquery.dataTables.min.js"></script>
<script type="text/javascript" src="../../js/plugin/datatables/dataTables.select.min.js"></script>
<script type="text/javascript" src="../../js/plugin/datatables/dataTables.bootstrap.min.js"></script>
<script type="text/javascript" src="../../js/my/permission.js"></script>
<script type="text/javascript">

    // 导入按钮：layui upload
    layui.use('upload', function () {
        var upload = layui.upload;
        upload.render({
            elem: '#importExcel',
            accept: 'file',
            url: '/edi210/import',
            before: function () {
                layui.use('layer', function () {
                    layui.layer.load();
                    $(".layui-layer-shade").css('background', '#000000');
                    $(".layui-layer-shade").css('opacity', '0.2');
                });
            },
            done: function (res) {
                layer.msg("导入成功");
                layui.use('layer', function () {
                    layui.layer.closeAll();
                    setTimeout(function () { layui.layer.closeAll(); }, 1000);
                });
                example.ajax.reload();
            },
            error: function () {
                layui.use('layer', function () { layui.layer.closeAll(); });
                layer.msg("导入失败");
            }
        });
    });

    // 导出
    $("#exportExcel").click(function () {
        $("#regionForm").val($('#region').val());
        $("#scacForm").val($('#scac').val());
        $("#invNoForm").val($('#invNo').val());
        $("#bolForm").val($('#bol').val());
        $("#dateFromForm").val($('#dateFrom').val());
        $("#dateToForm").val($('#dateTo').val());
        $("#token").val(localStorage.getItem("token"));
        $("#exportForm").attr("onsubmit", "return true");
        $("#exportForm")[0].submit();
        $("#exportForm").attr("onsubmit", "return false");
    });

    // 模板下载
    $("#downloadTpl").click(function () {
        window.location.href = "/edi210/template?token=" + localStorage.getItem("token");
    });

    var example;

    function statusText(s) {
        if (s == 0) return '草稿';
        if (s == 1) return '已确认';
        if (s == 2) return '已发送';
        return s;
    }

    function init() {
        example = $('#dt-table').DataTable({
            "searching": false,
            "processing": false,
            "serverSide": true,
            "ordering": false,
            "language": { "url": "/js/plugin/datatables/Chinese.lang" },
            "ajax": {
                "url": "/edi210/list",
                "type": "get",
                "data": function (d) {
                    d.region   = $('#region').val();
                    d.scac     = $('#scac').val();
                    d.invNo    = $('#invNo').val();
                    d.bol      = $('#bol').val();
                    d.dateFrom = $('#dateFrom').val();
                    d.dateTo   = $('#dateTo').val();
                },
                "error": function (xhr) {
                    var msg = xhr.responseText;
                    var response = JSON.parse(msg);
                    if (response.code == 401) {
                        localStorage.removeItem("token");
                        layer.msg("token过期，请先登录", { shift: -1, time: 1000 }, function () {
                            location.href = '/login.html';
                        });
                    } else {
                        layer.msg(response.message || '系统错误');
                    }
                }
            },
            "dom": "<'dt-toolbar'r>t<'dt-toolbar-footer'<'col-sm-10 col-xs-12 hidden-xs'i><'col-xs-12 col-sm-10' p v>>",
            "columns": [
                { "data": "id", "defaultContent": "", "visible": false },
                { "data": "region", "defaultContent": "" },
                { "data": "scac", "defaultContent": "" },
                { "data": "invNo", "defaultContent": "" },
                { "data": "invDate", "defaultContent": "" },
                { "data": "bol", "defaultContent": "" },
                { "data": "billToName", "defaultContent": "" },
                { "data": "shipperName", "defaultContent": "" },
                { "data": "consigneeName", "defaultContent": "" },
                { "data": "cur", "defaultContent": "" },
                { "data": "invAmount", "defaultContent": "" },
                { "data": "chargeCount", "defaultContent": "0" },
                { "data": "status", "defaultContent": "",
                  "render": function (d) { return statusText(d); } },
                { "data": "createTime", "defaultContent": "" },
                { "data": "id", "defaultContent": "",
                  "render": function (id) {
                      return '<a class="btn btn-xs btn-primary btn-detail" data-id="' + id + '">详情</a> '
                           + '<a class="btn btn-xs btn-danger btn-del" data-id="' + id + '">删除</a>';
                  } }
            ]
        });
    }

    $("#searchBt").click(function () { example.ajax.reload(); });

    // 详情：弹出层 iframe
    $('body').on('click', '.btn-detail', function () {
        var id = $(this).data('id');
        layer.open({
            type: 2,
            title: 'EDI 210 发票详情',
            area: ['90%', '90%'],
            content: '/pages/edi210/detail.html?id=' + id
        });
    });

    // 删除
    $('body').on('click', '.btn-del', function () {
        var id = $(this).data('id');
        layer.confirm('确认删除这条发票及其所有明细?', function (idx) {
            $.ajax({
                url: '/edi210/' + id,
                type: 'DELETE',
                headers: { 'Authorization': localStorage.getItem("token") },
                success: function () {
                    layer.close(idx);
                    layer.msg('删除成功');
                    example.ajax.reload();
                },
                error: function () { layer.msg('删除失败'); }
            });
        });
    });

    init();
</script>
